name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing
        env:
          # AI keys are not available in CI — tests mock all AI calls
          AI_API_KEY: ""
          AI_PROVIDER: "none"

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build . --file Dockerfile --tag app-test:latest

      - name: Verify frontend assets were compiled into image
        run: |
          docker run --rm app-test:latest sh -c "
            test -s /app/static/css/tailwind.css && echo 'tailwind.css OK' &&
            test -s /app/static/vendor/alpine.min.js && echo 'alpine.min.js OK'
          "
